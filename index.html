<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook ID Live Checker</title>
<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial,sans-serif;
    color:white;
}.container{ max-width:900px; margin:auto; padding:20px; }

.card{ background:#1e293b; border-radius:15px; padding:20px; margin-top:20px; }

h1{ text-align:center; }

textarea{ width:100%; height:250px; background:#0f172a; color:white; border:none; border-radius:10px; padding:15px; font-size:15px; outline:none; }

button{ width:100%; padding:14px; margin-top:15px; border:none; border-radius:10px; background:#2563eb; color:white; font-size:16px; cursor:pointer; font-weight:bold; }

button:hover{ opacity:0.9; }

.stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:20px; }

.box{ background:#0f172a; padding:15px; border-radius:10px; text-align:center; }

.result{ margin-top:20px; background:#0f172a; padding:15px; border-radius:10px; max-height:400px; overflow:auto; }

.live{ color:#22c55e; margin-bottom:8px; }

.die{ color:#ef4444; margin-bottom:8px; }

.error{ color:#f59e0b; margin-bottom:8px; }

.footer{ text-align:center; margin-top:30px; opacity:0.7; } </style>

</head>
<body><div class="container"><h1>Facebook ID Live Checker</h1><div class="card"><p>Masukkan ID Facebook (1 ID per baris)</p><textarea id="ids" placeholder="615xxxxxxxx\n615xxxxxxxx"></textarea><button onclick="startCheck()">CEK SEKARANG</button> <button onclick="downloadLive()">DOWNLOAD LIVE</button> <button onclick="downloadDie()">DOWNLOAD DIE</button> <button onclick="clearAll()">HAPUS SEMUA</button>

<div class="stats">
    <div class="box">
        <h2 id="total">0</h2>
        <p>Total</p>
    </div><div class="box">
    <h2 id="live">0</h2>
    <p>Live</p>
</div>

<div class="box">
    <h2 id="die">0</h2>
    <p>Die</p>
</div>

</div><div class="result" id="result">
Hasil akan muncul di sini...
</div></div><div class="footer">
Facebook ID Checker Web
</div></div><script>
let liveList = [];
let dieList = [];

async function checkID(id){
    try{
        const url = `https://www.facebook.com/profile.php?id=${id}`;

        const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);

        const text = await response.text();

        const lower = text.toLowerCase();

        if(
            lower.includes("page isn't available") ||
            lower.includes("content not found") ||
            lower.includes("profil ini tidak tersedia") ||
            lower.includes("sorry, this content isn't available right now")
        ){
            return false;
        }

        return true;

    }catch(e){
        return null;
    }
}

async function startCheck(){

    liveList = [];
    dieList = [];

    const result = document.getElementById('result');

    result.innerHTML = '';

    let ids = document.getElementById('ids').value.trim().split('\n');

    ids = ids.filter(x => x.trim() !== '');

    document.getElementById('total').innerText = ids.length;

    let live = 0;
    let die = 0;

    for(let id of ids){

        id = id.trim();

        const status = await checkID(id);

        if(status === true){

            live++;
            liveList.push(id);

            result.innerHTML += `<div class="live">✅ LIVE → ${id}</div>`;

        }else if(status === false){

            die++;
            dieList.push(id);

            result.innerHTML += `<div class="die">❌ DIE → ${id}</div>`;

        }else{

            result.innerHTML += `<div class="error">⚠ ERROR → ${id}</div>`;
        }

        document.getElementById('live').innerText = live;
        document.getElementById('die').innerText = die;
    }
}

function download(filename, text){
    const element = document.createElement('a');
    element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
    element.setAttribute('download', filename);
    element.style.display = 'none';
    document.body.appendChild(element);
    element.click();
    document.body.removeChild(element);
}

function downloadLive(){
    if(liveList.length === 0){
        alert('Tidak ada ID live');
        return;
    }

    download('live.txt', liveList.join('\n'));
}

function downloadDie(){
    if(dieList.length === 0){
        alert('Tidak ada ID die');
        return;
    }

    download('die.txt', dieList.join('\n'));
}

function clearAll(){
    document.getElementById('ids').value = '';
    document.getElementById('result').innerHTML = 'Hasil akan muncul di sini...';
    document.getElementById('total').innerText = '0';
    document.getElementById('live').innerText = '0';
    document.getElementById('die').innerText = '0';

    liveList = [];
    dieList = [];
}
</script></body>
</html>
