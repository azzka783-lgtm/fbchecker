<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook UID Checker</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

h1{
    text-align:center;
}

textarea{
    width:100%;
    height:250px;
    background:#111827;
    color:white;
    border:none;
    border-radius:10px;
    padding:15px;
    font-size:15px;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:20px;
}

.box{
    background:#111827;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.result{
    background:#111827;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
    max-height:450px;
    overflow:auto;
}

.live{
    color:#22c55e;
    margin-bottom:8px;
}

.die{
    color:#ef4444;
    margin-bottom:8px;
}

.error{
    color:#f59e0b;
    margin-bottom:8px;
}

.footer{
    text-align:center;
    margin-top:30px;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Facebook UID Checker</h1>

<textarea id="uids" placeholder="615xxxxxxxx"></textarea>

<button onclick="checkUID()">
CHECK UID
</button>

<div class="stats">

<div class="box">
<h2 id="total">0</h2>
<p>Total</p>
</div>

<div class="box">
<h2 id="live">0</h2>
<p>Live</p>
</div>

<div class="box">
<h2 id="die">0</h2>
<p>Die</p>
</div>

</div>

<div class="result" id="result">
Hasil akan muncul di sini...
</div>

</div>

<div class="footer">
Facebook Checker Web
</div>

</div>

<script>

async function checkID(id){

    try{

        const controller =
        new AbortController();

        const timeout =
        setTimeout(() => {
            controller.abort();
        }, 8000);

        const url =
        'https://www.facebook.com/profile.php?id=' + id;

        const res = await fetch(
            'https://api.allorigins.win/raw?url=' +
            encodeURIComponent(url),
            {
                signal: controller.signal
            }
        );

        clearTimeout(timeout);

        const text = await res.text();

        const lower =
        text.toLowerCase();

        if(
            lower.includes(\"page isn't available\") ||
            lower.includes('content not found') ||
            lower.includes('profil ini tidak tersedia') ||
            lower.includes(\"sorry, this content isn't available right now\")
        ){

            return {
                id:id,
                status:'die'
            };

        }

        return {
            id:id,
            status:'live'
        };

    }catch{

        return {
            id:id,
            status:'error'
        };

    }

}

async function runBatch(ids,batchSize=10){

    let results = [];

    for(
        let i=0;
        i<ids.length;
        i+=batchSize
    ){

        const batch =
        ids.slice(i,i+batchSize);

        const res =
        await Promise.all(
            batch.map(checkID)
        );

        results.push(...res);

    }

    return results;

}

async function checkUID(){

    const ids = document
    .getElementById('uids')
    .value
    .split('\\n')
    .map(x => x.trim())
    .filter(x => x);

    const result =
    document.getElementById('result');

    result.innerHTML =
    'Sedang mengecek...';

    document
    .getElementById('total')
    .innerText = ids.length;

    document
    .getElementById('live')
    .innerText = '0';

    document
    .getElementById('die')
    .innerText = '0';

    const checks =
    await runBatch(ids,10);

    result.innerHTML = '';

    let live = 0;
    let die = 0;

    for(let data of checks){

        if(data.status == 'live'){

            live++;

            result.innerHTML +=
            `<div class="live">
            ✅ LIVE → ${data.id}
            </div>`;

        }else if(data.status == 'die'){

            die++;

            result.innerHTML +=
            `<div class="die">
            ❌ DIE → ${data.id}
            </div>`;

        }else{

            result.innerHTML +=
            `<div class="error">
            ⚠ ERROR → ${data.id}
            </div>`;
        }

    }

    document
    .getElementById('live')
    .innerText = live;

    document
    .getElementById('die')
    .innerText = die;

}

</script>

</body>
</html>
